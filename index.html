<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horários</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --line: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --ok: #22c55e;
      --warn: #f59e0b;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 12px 16px;
    }

    .topbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }

    .btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      background: var(--accent);
      color: white;
      font-weight: 700;
    }

    button.secondary { background: #334155; }
    button.success { background: var(--ok); }
    button.warn { background: var(--warn); color: #111827; }

    main {
      padding: 16px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .tab {
      background: white;
      color: #111827;
      border: 1px solid #d1d5db;
    }

    .tab.active {
      background: #111827;
      color: white;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }

    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }

    .card h3 {
      margin: 0;
      padding: 12px 14px;
      background: #111827;
      color: white;
      font-size: 16px;
    }

    .frameWrap {
      padding: 12px;
    }

    iframe {
      width: 100%;
      min-height: 720px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: white;
    }

    #exportArea {
      background: white;
      border-radius: 14px;
      border: 1px solid #e5e7eb;
      padding: 16px;
    }

    .status {
      margin-left: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    @media print {
      header, .tabs, .btns { display: none !important; }
      body { background: white; }
      iframe { min-height: 1000px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <strong>Horários</strong>
      <div class="btns">
        <button class="tab active" data-target="painel-tecnicos">Técnicos</button>
        <button class="tab" data-target="painel-medicos">Médicos</button>
        <button class="tab" data-target="painel-oncall">Oncall</button>
        <button class="tab" data-target="painel-telefones">Telefones</button>
        <button class="success" id="btnExportPDF">Exportar PDF</button>
        <button class="warn" id="btnExportIMG">Exportar Imagem</button>
      </div>
    </div>
    <div class="status" id="status">Pronto.</div>
  </header>

  <main>
    <div id="exportArea">
      <div id="painel-tecnicos" class="panel active">
        <div class="grid">
          <div class="card">
            <h3>Horário Técnicos</h3>
            <div class="frameWrap">
              <iframe
                data-src="URL_DO_TEU_IFRAME_TECNICOS"
                loading="lazy"
                title="Horário Técnicos"
                referrerpolicy="no-referrer"
              ></iframe>
            </div>
          </div>
        </div>
      </div>

      <div id="painel-medicos" class="panel">
        <div class="grid">
          <div class="card">
            <h3>Horário Médicos</h3>
            <div class="frameWrap">
              <iframe
                data-src="URL_DO_TEU_IFRAME_MEDICOS"
                loading="lazy"
                title="Horário Médicos"
                referrerpolicy="no-referrer"
              ></iframe>
            </div>
          </div>
        </div>
      </div>

      <div id="painel-oncall" class="panel">
        <div class="grid">
          <div class="card">
            <h3>Oncall</h3>
            <div class="frameWrap">
              <iframe
                data-src="URL_DO_TEU_IFRAME_ONCALL"
                loading="lazy"
                title="Oncall"
                referrerpolicy="no-referrer"
              ></iframe>
            </div>
          </div>
        </div>
      </div>

      <div id="painel-telefones" class="panel">
        <div class="grid">
          <div class="card">
            <h3>Telefones</h3>
            <div class="frameWrap">
              <iframe
                data-src="URL_DO_TEU_IFRAME_TELEFONES"
                loading="lazy"
                title="Telefones"
                referrerpolicy="no-referrer"
              ></iframe>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const firebaseConfig = {
      apiKey: "TUA_API_KEY",
      authDomain: "TEU_PROJECT.firebaseapp.com",
      projectId: "TEU_PROJECT",
      storageBucket: "TEU_PROJECT.appspot.com",
      messagingSenderId: "TUE_SENDER_ID",
      appId: "TUA_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    db.enablePersistence().catch((err) => {
      console.log("Persistence indisponível:", err.code);
    });

    const statusEl = document.getElementById("status");
    const tabs = document.querySelectorAll(".tab");
    const panels = document.querySelectorAll(".panel");
    const iframes = document.querySelectorAll("iframe[data-src]");
    const exportArea = document.getElementById("exportArea");

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function loadFrameByPanel(panelId) {
      const panel = document.getElementById(panelId);
      if (!panel) return;
      panel.querySelectorAll("iframe[data-src]").forEach((f) => {
        if (!f.src) f.src = f.dataset.src;
      });
    }

    function openTab(target) {
      tabs.forEach(t => t.classList.toggle("active", t.dataset.target === target));
      panels.forEach(p => p.classList.toggle("active", p.id === target));
      loadFrameByPanel(target);
      setStatus(`A abrir ${target.replace("painel-", "")}...`);
    }

    tabs.forEach(tab => {
      tab.addEventListener("click", () => openTab(tab.dataset.target));
    });

    loadFrameByPanel("painel-tecnicos");

    async function exportPDF() {
      setStatus("A gerar PDF...");
      const { jsPDF } = window.jspdf;
      const canvas = await html2canvas(exportArea, { scale: 2, useCORS: true, backgroundColor: "#ffffff" });
      const imgData = canvas.toDataURL("image/png");
      const pdf = new jsPDF("p", "mm", "a4");
      const pdfWidth = pdf.internal.pageSize.getWidth();
      const pdfHeight = pdf.internal.pageSize.getHeight();
      const imgWidth = pdfWidth;
      const imgHeight = canvas.height * imgWidth / canvas.width;
      let heightLeft = imgHeight;
      let position = 0;

      pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
      heightLeft -= pdfHeight;

      while (heightLeft > 0) {
        position = heightLeft - imgHeight;
        pdf.addPage();
        pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
        heightLeft -= pdfHeight;
      }

      pdf.save("horarios.pdf");
      setStatus("PDF gerado.");
    }

    async function exportIMG() {
      setStatus("A gerar imagem...");
      const canvas = await html2canvas(exportArea, { scale: 2, useCORS: true, backgroundColor: "#ffffff" });
      const link = document.createElement("a");
      link.download = "horarios.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
      setStatus("Imagem gerada.");
    }

    document.getElementById("btnExportPDF").addEventListener("click", exportPDF);
    document.getElementById("btnExportIMG").addEventListener("click", exportIMG);
  </script>
</body>
</html>
